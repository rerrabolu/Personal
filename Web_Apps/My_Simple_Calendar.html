<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .app {
    width: 100%;
    max-width: 700px;
  }

  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: bold;
    color: #2e7d32;
    margin-bottom: 1rem;
    letter-spacing: 0.5px;
  }

  /* ── Row 1: << Month  Today  Month >> ── */
  .row-nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .btn-nav {
    background: #1565c0;
    color: #ffffff;
    border: none;
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 14px;
    font-family: Georgia, serif;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    min-width: 110px;
  }
  .btn-nav:hover { background: #0d47a1; }
  .btn-nav:active { transform: scale(0.97); }

  /* ── Row 2: Month  Year  Show Calendar ── */
  .row-jump {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .field-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .field-label {
    font-size: 13px;
    font-weight: bold;
    color: #2e7d32;
    font-family: Georgia, serif;
  }

  select.input-month, input.input-year {
    border: 2px solid #2e7d32;
    border-radius: 5px;
    padding: 6px 8px;
    font-size: 13px;
    font-family: Georgia, serif;
    color: #1a3a5c;
    background: #ffffff;
    outline: none;
  }
  select.input-month:focus, input.input-year:focus {
    border-color: #1b5e20;
    box-shadow: 0 0 0 2px rgba(46,125,50,0.2);
  }

  select.input-month { width: 130px; }
  input.input-year   { width: 75px; text-align: center; }

  .btn-show {
    background: #2e7d32;
    color: #ffffff;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 13px;
    font-family: Georgia, serif;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-show:hover { background: #1b5e20; }
  .btn-show:active { transform: scale(0.97); }

  /* ── Calendar card ── */
  .calendar-card {
    background: #ffffff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  }

  .cal-header {
    background: #1565c0;
    color: #ffffff;
    text-align: center;
    padding: 14px 0 10px;
  }
  .cal-header .month-year {
    font-size: 1.3rem;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  /* ── Day-of-week header row ── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .dow-cell {
    background: #2e7d32;
    color: #ffffff;
    text-align: center;
    padding: 9px 0;
    font-size: 13px;
    font-weight: bold;
    font-family: Georgia, serif;
    border-right: 1px solid #1b5e20;
  }
  .dow-cell:last-child { border-right: none; }

  /* ── Day cells ── */
  .day-cell {
    min-height: 62px;
    padding: 6px 8px 4px;
    border-top: 1px solid #e0e0e0;
    border-right: 1px solid #e0e0e0;
    font-size: 14px;
    font-family: Georgia, serif;
    color: #222;
    background: #ffffff;
    vertical-align: top;
    position: relative;
  }
  .day-cell:nth-child(7n) { border-right: none; }

  .day-cell.other-month {
    background: #f5f5f5;
    color: #bdbdbd;
  }

  .day-cell.today-cell {
    background: #fff3e0;
  }

  .day-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-weight: bold;
    font-size: 14px;
  }

  .day-cell.today-cell .day-number {
    background: #e65100;
    color: #ffffff;
  }

  /* weekend subtle tint */
  .day-cell.weekend { background: #fafafa; }
  .day-cell.weekend.today-cell { background: #fff3e0; }

  /* error message */
  .error-msg {
    text-align: center;
    color: #c62828;
    font-size: 13px;
    min-height: 18px;
    margin-bottom: 4px;
    font-family: Georgia, serif;
  }
</style>
</head>
<body>

<div class="app">

  <h1>Calendar</h1>

  <p class="error-msg" id="errorMsg"></p>

  <!-- Row 1: Month / Year / Show Calendar (textboxes) -->
  <div class="row-jump">
    <div class="field-group">
      <label class="field-label" for="monthSelect">Month</label>
      <select class="input-month" id="monthSelect">
        <option value="0">January</option>
        <option value="1">February</option>
        <option value="2">March</option>
        <option value="3">April</option>
        <option value="4">May</option>
        <option value="5">June</option>
        <option value="6">July</option>
        <option value="7">August</option>
        <option value="8">September</option>
        <option value="9">October</option>
        <option value="10">November</option>
        <option value="11">December</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label" for="yearInput">Year</label>
      <input class="input-year" type="number" id="yearInput" min="1900" max="2200" step="1">
    </div>
    <button class="btn-show" onclick="showCalendar()">Show Calendar</button>
  </div>

  <!-- Row 2: Navigation buttons -->
  <div class="row-nav">
    <button class="btn-nav" onclick="prevMonth()">&lt;&lt; Month</button>
    <button class="btn-nav" onclick="goToday()">Today</button>
    <button class="btn-nav" onclick="nextMonth()">Month &gt;&gt;</button>
  </div>

  <!-- Calendar -->
  <div class="calendar-card">
    <div class="cal-header">
      <div class="month-year" id="calTitle"></div>
    </div>

    <div class="cal-grid" id="calGrid">
      <!-- Day-of-week headers: Mon → Sun -->
      <div class="dow-cell">Mon</div>
      <div class="dow-cell">Tue</div>
      <div class="dow-cell">Wed</div>
      <div class="dow-cell">Thu</div>
      <div class="dow-cell">Fri</div>
      <div class="dow-cell">Sat</div>
      <div class="dow-cell">Sun</div>
    </div>
  </div>

</div>

<script>
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  const today = new Date();
  const todayD = today.getDate();
  const todayM = today.getMonth();
  const todayY = today.getFullYear();

  let viewMonth = todayM;
  let viewYear  = todayY;
  let isCurrentMonthView = true;

  function init() {
    document.getElementById('monthSelect').value = todayM;
    document.getElementById('yearInput').value   = todayY;
    renderCalendar();
  }

  function syncControls() {
    document.getElementById('monthSelect').value = viewMonth;
    document.getElementById('yearInput').value   = viewYear;
    clearError();
  }

  function clearError() {
    document.getElementById('errorMsg').textContent = '';
  }

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
  }

  function renderCalendar() {
    syncControls();

    document.getElementById('calTitle').textContent =
      MONTHS[viewMonth] + ' ' + viewYear;

    const grid = document.getElementById('calGrid');

    const dayNodes = grid.querySelectorAll('.day-cell');
    dayNodes.forEach(n => n.remove());

    const firstOfMonth = new Date(viewYear, viewMonth, 1);
    const daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev   = new Date(viewYear, viewMonth, 0).getDate();

    let startDow = firstOfMonth.getDay();
    startDow = (startDow === 0) ? 6 : startDow - 1;

    const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      let dayNum, isOther = false;

      if (i < startDow) {
        dayNum  = daysInPrev - startDow + i + 1;
        isOther = true;
      } else if (i >= startDow + daysInMonth) {
        dayNum  = i - startDow - daysInMonth + 1;
        isOther = true;
      } else {
        dayNum = i - startDow + 1;
      }

      if (isOther) {
        cell.classList.add('other-month');
      }

      const colIndex = i % 7;
      if (colIndex === 5 || colIndex === 6) {
        cell.classList.add('weekend');
      }

      const isToday = isCurrentMonthView &&
                      !isOther &&
                      dayNum  === todayD &&
                      viewMonth === todayM &&
                      viewYear  === todayY;

      if (isToday) cell.classList.add('today-cell');

      const numSpan = document.createElement('span');
      numSpan.className   = 'day-number';
      numSpan.textContent = dayNum;
      cell.appendChild(numSpan);

      grid.appendChild(cell);
    }
  }

  function prevMonth() {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    isCurrentMonthView = (viewMonth === todayM && viewYear === todayY);
    renderCalendar();
  }

  function nextMonth() {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    isCurrentMonthView = (viewMonth === todayM && viewYear === todayY);
    renderCalendar();
  }

  function goToday() {
    viewMonth = todayM;
    viewYear  = todayY;
    isCurrentMonthView = true;
    renderCalendar();
  }

  function showCalendar() {
    clearError();
    const selMonth = parseInt(document.getElementById('monthSelect').value);
    const typedYear = parseInt(document.getElementById('yearInput').value);

    if (isNaN(typedYear) || typedYear < 1900 || typedYear > 2200) {
      showError('Please enter a valid year between 1900 and 2200.');
      return;
    }

    viewMonth = selMonth;
    viewYear  = typedYear;
    isCurrentMonthView = (viewMonth === todayM && viewYear === todayY);
    renderCalendar();
  }

  init();
</script>
</body>
</html>
